<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/brand/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Cute 3D printed charms, fidgets and gifts, made in small batches from our little studio in Canada." />
    <title>The Tiny Magic Studio</title>
    <!-- Link previews (Discord, iMessage, socials) read these — keep them on-brand -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="The Tiny Magic Studio" />
    <meta property="og:title" content="The Tiny Magic Studio" />
    <meta property="og:description" content="Cute 3D printed charms, fidgets and gifts, made in small batches from our little studio in Canada." />
    <meta property="og:url" content="https://thetinymagicstudio.ca/" />
    <meta property="og:image" content="https://thetinymagicstudio.ca/brand/logo.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="theme-color" content="#b3c375" />
    <script>
      // Apply persisted theme + appearance before first paint to avoid a flash
      try {
        var raw = localStorage.getItem('tms-ui') || localStorage.getItem('tinybiz-ui');
        var parsed = raw ? JSON.parse(raw) : {};
        var state = parsed.state || {};
        // Pre-v2 stores are migrated to the brand look on load — mirror that
        // here so the first paint doesn't flash the old theme.
        if ((parsed.version || 0) < 2) {
          state.theme = 'dark';
          if (state.accent !== 'custom') state.accent = 'tinymagic';
        }
        var theme = state.theme || 'dark';
        var dark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        var el = document.documentElement;
        var accent = state.accent || 'tinymagic';
        // The storefront (everything outside /admin) follows the visitor's own
        // theme choice — soft cream by default — and always wears the brand accent
        if (location.pathname.indexOf('/admin') !== 0) {
          dark = localStorage.getItem('tms-store-theme') === 'dark';
          el.setAttribute('data-storefront', '1');
          accent = 'tinymagic';
        }
        if (dark) el.classList.add('dark');
        el.setAttribute('data-accent', accent);
        if (state.radius) el.setAttribute('data-radius', state.radius);
        if (state.scale) el.setAttribute('data-scale', state.scale);
        // Custom accent: rebuild the token style tag from persisted values
        if (state.accent === 'custom' && state.customAccent) {
          var css = '';
          var block = function (sel, tokens) {
            css += sel + '{';
            for (var k in tokens) css += '--' + k + ':' + tokens[k] + ';';
            css += '}';
          };
          block("html[data-accent='custom']", state.customAccent.light);
          block("html.dark[data-accent='custom']", state.customAccent.dark);
          var st = document.createElement('style');
          st.id = 'tms-custom-accent';
          st.textContent = css;
          document.head.appendChild(st);
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Boot guard: the app must never die into a silent blank page. It covers
      // three failure shapes: the entry script fails to load (cached 404,
      // blocked file) → reload once, then a message; the app crashes DURING or
      // AFTER boot and React unmounts everything → message with the real error
      // text (so a screenshot is a diagnosis); a merely slow network → patience.
      (function () {
        var start = Date.now();
        var lastErr = '';
        function esc(s) {
          return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
        function card(root) {
          var dark = document.documentElement.classList.contains('dark');
          root.innerHTML =
            '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,Segoe UI,Roboto,sans-serif;padding:24px;">' +
            '<div style="max-width:440px;text-align:center;color:' + (dark ? '#e8e6df' : '#2b2a26') + ';">' +
            '<div style="font-size:40px;">✨</div>' +
            '<h1 style="font-size:20px;margin:14px 0 8px;">The shop is having trouble loading</h1>' +
            '<p style="font-size:14px;line-height:1.6;opacity:.75;margin:0 0 20px;">We may have just published an update. It usually sorts itself out within a minute or two.</p>' +
            '<button onclick="sessionStorage.removeItem(\'tms-boot-retry\');location.reload()" style="background:#b3c375;color:#26290f;border:0;border-radius:12px;padding:11px 22px;font-size:15px;font-weight:700;cursor:pointer;">Try again</button>' +
            (lastErr
              ? '<div style="font:11px/1.5 ui-monospace,Menlo,Consolas,monospace;opacity:.5;margin-top:18px;word-break:break-word;">' + esc(lastErr).slice(0, 400) + '</div>'
              : '') +
            '</div></div>';
        }
        function showCardOrRetry() {
          var root = document.getElementById('root');
          if (!root) return;
          var last = Number(sessionStorage.getItem('tms-boot-retry') || 0);
          if (window.__tmsEntryFailed && Date.now() - last > 60000) {
            sessionStorage.setItem('tms-boot-retry', String(Date.now()));
            location.reload();
            return;
          }
          card(root);
        }
        // Capture phase sees resource errors (they don't bubble) — a failed
        // entry chunk is told apart from a merely slow network. Runtime errors
        // carry a message worth showing. (An onerror attribute on the script
        // tag doesn't survive the build, hence the listener.)
        window.addEventListener(
          'error',
          function (e) {
            var t = e.target;
            if (t && t.tagName === 'SCRIPT' && t.src) {
              window.__tmsEntryFailed = 1;
              lastErr = lastErr || 'Script failed to load: ' + String(t.src).split('/').pop();
              return;
            }
            if (e && e.message) {
              lastErr = e.message + (e.filename ? ' — ' + String(e.filename).split('/').pop() + ':' + e.lineno : '');
              // A crash can unmount the ALREADY-BOOTED app back to an empty
              // root — catch that death too, right as it happens.
              setTimeout(function () {
                var root = document.getElementById('root');
                if (root && root.childElementCount === 0) card(root);
              }, 150);
            }
          },
          true
        );
        window.addEventListener('unhandledrejection', function (e) {
          try {
            if (!lastErr) lastErr = 'Unhandled: ' + String((e.reason && (e.reason.message || e.reason)) || 'promise rejection');
          } catch (err) {}
        });
        function stuck() {
          var root = document.getElementById('root');
          if (!root || root.childElementCount > 0) return; // booted — all good
          if (!window.__tmsEntryFailed && !lastErr && Date.now() - start < 40000) {
            return void setTimeout(stuck, 4000); // still downloading
          }
          showCardOrRetry();
        }
        setTimeout(stuck, 8000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
