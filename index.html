<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐣</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TinyBiz — the all-in-one workspace for makers and small shops" />
    <title>TinyBiz — Small Business Manager</title>
    <script>
      // Apply persisted theme + appearance before first paint to avoid a flash
      try {
        var raw = localStorage.getItem('tinybiz-ui');
        var state = raw ? JSON.parse(raw).state : {};
        var theme = state.theme || 'light';
        var dark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        var el = document.documentElement;
        if (dark) el.classList.add('dark');
        if (state.accent) el.setAttribute('data-accent', state.accent);
        if (state.radius) el.setAttribute('data-radius', state.radius);
        if (state.scale) el.setAttribute('data-scale', state.scale);
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
